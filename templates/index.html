<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Öğrenci Kayıt Otomasyonu</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Öğrenci Kayıt</h1>
        <p class="subtitle">Öğrenci Kayıt ve Yönetim Paneli</p>
      </header>

      <div class="dashboard-grid">
        <!-- Left Side: Add Student -->
        <div class="card">
          <h3><i class="fas fa-user-plus"></i> Yeni Kayıt</h3>
          <form id="addForm" style="margin-top: 1.5rem">
            <div class="form-group">
              <label>Öğrenci Numarası</label>
              <input type="number" id="no" required placeholder="Örn: 1234" />
            </div>
            <div class="form-group">
              <label>Ad</label>
              <input type="text" id="ad" required placeholder="Ahmet" />
            </div>
            <div class="form-group">
              <label>Soyad</label>
              <input type="text" id="soyad" required placeholder="Yılmaz" />
            </div>
            <button type="submit" id="submitBtn">
              <i class="fas fa-check"></i> Kaydet
            </button>
          </form>
        </div>

        <!-- Right Side: Student List & Search -->
        <div class="card">
          <div class="search-bar">
            <input
              type="text"
              id="searchInput"
              placeholder="Öğrenci no ile ara..."
            />
          </div>

          <div class="list-header">
            <h3>Kayıtlı Öğrenciler</h3>
            <button id="clearAllBtn" class="clear-btn">
              <i class="fas fa-trash-sweep"></i> Tümünü Sil
            </button>
          </div>

          <div id="studentList" class="student-list">
            <!-- Students will be loaded here -->
            <div class="empty-state">Yükleniyor...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="modal-overlay">
      <div class="modal">
        <h3 id="modalTitle">Emin misiniz?</h3>
        <p id="modalMsg">Bu işlem geri alınamaz.</p>
        <div class="modal-actions">
          <button id="cancelBtn" class="btn-secondary">İptal</button>
          <button id="confirmBtn" class="btn-danger">Sil</button>
        </div>
      </div>
    </div>

    <script>
      const studentList = document.getElementById('studentList');
      const addForm = document.getElementById('addForm');
      const searchInput = document.getElementById('searchInput');

      // Fetch and display students
      async function fetchStudents() {
          try {
              const response = await fetch('/api/students');
              const students = await response.json();
              renderStudents(students);
          } catch (error) {
              console.error('Error fetching students:', error);
              studentList.innerHTML = '<div class="empty-state">Hata oluştu!</div>';
          }
      }

      function renderStudents(students) {
          if (students.length === 0) {
              studentList.innerHTML = '<div class="empty-state">Henüz kayıtlı öğrenci yok.</div>';
              return;
          }

          studentList.innerHTML = students.map(s => `
              <div class="student-item">
                  <div class="student-info">
                      <h4>${s.ad} ${s.soyad}</h4>
                      <span>No: ${s.no}</span>
                  </div>
                  <button class="delete-btn" onclick="deleteStudent(${s.no})">
                      <i class="fas fa-trash"></i>
                  </button>
              </div>
          `).join('');
      }

      // Add student
      addForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const submitBtn = document.getElementById('submitBtn');
          const data = {
              no: document.getElementById('no').value,
              ad: document.getElementById('ad').value,
              soyad: document.getElementById('soyad').value
          };

          submitBtn.disabled = true;
          submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> İşleniyor...';

          try {
              const response = await fetch('/api/students', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(data)
              });

              const result = await response.json();

              if (response.ok) {
                  addForm.reset();
                  fetchStudents();
              } else {
                  alert(result.error || 'Bir hata oluştu');
              }
          } catch (error) {
              alert('Sunucu hatası');
          } finally {
              submitBtn.disabled = false;
              submitBtn.innerHTML = '<i class="fas fa-check"></i> Kaydet';
          }
      });

        // Delete student
        const modal = document.getElementById('confirmModal');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');

        function showModal(title, msg, onConfirm) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMsg').innerText = msg;
            modal.style.display = 'flex';
            
            const cleanup = () => {
                modal.style.display = 'none';
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
            };

            confirmBtn.onclick = () => {
                onConfirm();
                cleanup();
            };
            cancelBtn.onclick = cleanup;
        }

        async function deleteStudent(no) {
            showModal('Kayıt Silinecek', `No: ${no} olan öğrenci silinecek. Emin misiniz?`, async () => {
                try {
                    const response = await fetch(`/api/students/${no}`, { method: 'DELETE' });
                    if (response.ok) fetchStudents();
                } catch (error) {
                    alert('Silme işlemi başarısız');
                }
            });
        }

        clearAllBtn.addEventListener('click', () => {
            showModal('Tüm Kayıtlar Silinecek', 'TÜM öğrenci kayıtları silinecek! Bu işlem geri alınamaz.', async () => {
                try {
                    const response = await fetch('/api/students/bulk', { method: 'DELETE' });
                    if (response.ok) fetchStudents();
                } catch (error) {
                    alert('Hata oluştu');
                }
            });
        });

      // Search filter
      searchInput.addEventListener('input', (e) => {
          const term = e.target.value.toLowerCase();
          const items = document.querySelectorAll('.student-item');

          items.forEach(item => {
              const text = item.textContent.toLowerCase();
              item.style.display = text.includes(term) ? 'flex' : 'none';
          });
      });

      // Initial load
      fetchStudents();
    </script>
  </body>
</html>
